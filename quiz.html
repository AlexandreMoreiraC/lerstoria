<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="https://res.cloudinary.com/dliyfpqqu/image/upload/v1775337424/izowmcoyatkdluan0kc3.png">

    <title>Desafio de Nível - Lerstoria</title>
    <style>
        :root {
            --primary-color: #1cb0f6;
            --bg-color: #f7f7f7;
            --text-dark: #333;
            --text-light: #afafaf;
            --white: #ffffff;
            --border-color: #e5e5e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-bar {
            width: 100%;
            background: var(--white);
            border-bottom: 2px solid var(--border-color);
            padding: 15px 0;
            margin-bottom: 30px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
        }

        .bar-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 800;
            font-size: 1.2rem;
        }

        .logo-small {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .quiz-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 2px solid var(--border-color);
            box-sizing: border-box;
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 14px;
            background: var(--border-color);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .question-text {
            font-size: 1.4rem;
            color: var(--text-dark);
            margin-bottom: 25px;
            font-weight: 700;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 18px;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            background: var(--white);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
            text-align: left;
            font-size: 1.05rem;
            color: #4b4b4b;
            box-shadow: 0 4px 0 var(--border-color);
        }

        .option-btn:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .option-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .result-screen {
            text-align: center;
            display: none;
            padding: 20px;
        }

        .result-icon { font-size: 5rem; margin-bottom: 15px; }
        .score-badge { font-size: 2.5rem; font-weight: 800; color: var(--primary-color); margin: 15px 0; }
        
        .btn-big {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 5px 0 #1899d6;
            transition: all 0.1s;
        }

        .btn-big:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1899d6;
        }
    </style>
</head>
<body>

    <header class="app-bar">
        <div class="container bar-flex">
            <a href="library.html" class="btn-back">✕ Sair</a>
            <div class="logo-small">Nível <span id="display-level">...</span></div>
            <div style="width: 50px;"></div> 
        </div>
    </header>

    <main class="container">
        <div class="quiz-container">
            <div id="quiz-ui">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress"></div>
                    </div>
                    <span id="step-count" style="font-weight: 800; color: var(--text-light);">1/10</span>
                </div>

                <div id="quiz-content">
                    <h2 class="question-text" id="question-text">Preparando desafio C2...</h2>
                    <div class="options-list" id="options"></div>
                </div>
            </div>

            <div id="result-screen" class="result-screen">
                <div class="result-icon" id="result-icon">🎉</div>
                <h2 id="result-title">Resultado</h2>
                <div class="score-badge" id="score-badge">0%</div>
                <p id="result-text" style="color: #777; font-weight: 600; line-height: 1.5;"></p>
                <button onclick="window.location.href='library.html'" class="btn-big" style="margin-top: 30px;">Voltar para Biblioteca</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const allQuestions = {
            "C2": [
                { q: "The proposal was ___ with fierce opposition from the board members.", options: ["hit", "met", "faced"], correct: 1 },
                { q: "She has always been a ___ of strength for her family.", options: ["tower", "pillar", "rock"], correct: 1 },
                { q: "Under no circumstances ___ the door be left unlocked.", options: ["must", "should", "shall"], correct: 1 },
                { q: "To all ___ and purposes, the project is already finished.", options: ["intents", "goals", "reasons"], correct: 0 },
                { q: "He is ___ to win the competition if he keeps this pace.", options: ["bound", "likely", "certainly"], correct: 0 },
                { q: "The evidence points ___ to his innocence.", options: ["strongly", "overwhelmingly", "highly"], correct: 1 },
                { q: "He has a ___ for getting into trouble.", options: ["knack", "habit", "tendency"], correct: 0 },
                { q: "___ of the consequences, he decided to proceed.", options: ["Regardless", "Irrespective", "Ignoring"], correct: 1 },
                { q: "The decision was made in ___ with the law.", options: ["accordance", "compliance", "alignment"], correct: 0 },
                { q: "His speech was ___ with irony.", options: ["filled", "laced", "covered"], correct: 1 }
            ]
        };

        const params = new URLSearchParams(window.location.search);
        const currentLevel = params.get('level') || 'C2';
        document.getElementById('display-level').innerText = currentLevel;

        // Seleciona as questões (ou C2 por padrão se o nível não existir no objeto)
        let questions = [...(allQuestions[currentLevel] || allQuestions["C2"])].sort(() => Math.random() - 0.5);
        let currentIdx = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                optionsDiv.appendChild(btn);
            });

            const progress = ((currentIdx) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('step-count').innerText = `${currentIdx + 1}/${questions.length}`;
        }

        async function checkAnswer(selected) {
            if (selected === questions[currentIdx].correct) {
                score++;
            }
            
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        async function showResults() {
            document.getElementById('quiz-ui').style.display = 'none';
            const resultScreen = document.getElementById('result-screen');
            const percent = (score / questions.length) * 100;
            
            resultScreen.style.display = 'block';
            document.getElementById('score-badge').innerText = `${percent}%`;

            if (percent >= 90) {
                document.getElementById('result-icon').innerText = "🏆";
                document.getElementById('result-title').innerText = "Maestria Alcançada!";
                document.getElementById('result-text').innerText = `Incrível! Você provou ter domínio total do nível ${currentLevel}. Seu progresso foi salvo.`;
                
                auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        const userRef = doc(db, "users", user.uid);
                        try {
                            await updateDoc(userRef, {
                                [`quizzes_done.${currentLevel}`]: true
                            });
                        } catch (e) {
                            console.error("Erro ao salvar progresso:", e);
                        }
                    }
                });
            } else {
                document.getElementById('result-icon').innerText = "📚";
                document.getElementById('result-title').innerText = "Continue Estudando";
                document.getElementById('result-text').innerText = `Você acertou ${score} de ${questions.length}. No nível C2, precisamos de 90% de precisão para validar sua proficiência.`;
            }
        }

        // Inicia o Quiz
        loadQuestion();
    </script>
</body>
</html>
