<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Lerstoria</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dliyfpqqu/image/upload/v1776621920/mcknlpf3fm8snymrfnw8.png">
    <link rel="stylesheet" href="./style.css">

    <style>
        /* Feedback de erro e estados do botão */
        .error-message {
            background-color: #fff2f2;
            color: #d93025;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ffcfcf;
            text-align: center;
            font-weight: 600;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 10px;
        }

        /* Destaque sutil para o campo de senha */
        .password-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: -10px;
            margin-bottom: 15px;
            padding-left: 5px;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <header class="auth-header">
            <a href="/index.html" class="logo" aria-label="Lerstoria Home">.lerstoria</a>
            <h1 class="story-title" style="font-size: 2.2rem; margin-top: 10px; font-weight: 800;">Criar conta</h1>
            <p class="auth-subtitle">Comece sua jornada de leitura hoje mesmo.</p>
        </header>

        <main class="auth-card">
            <div id="error-display" class="error-message" role="alert"></div>

            <form id="signup-form" class="auth-form">
                <div class="input-group">
                    <label for="name" class="sr-only">Nome completo</label>
                    <input type="text" id="name" placeholder="Nome completo" class="input-field" autocomplete="name" required>
                </div>

                <div class="input-group">
                    <label for="email" class="sr-only">E-mail</label>
                    <input type="email" id="email" placeholder="E-mail" class="input-field" autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label for="password" class="sr-only">Senha</label>
                    <input type="password" id="password" placeholder="Crie uma senha" class="input-field" autocomplete="new-password" minlength="6" required>
                </div>
                <p class="password-hint">Mínimo de 6 caracteres.</p>
                
                <button type="submit" id="btn-submit" class="btn-primary btn-full">
                    <span id="btn-text">Criar minha conta</span>
                </button>
            </form>

            <footer class="auth-footer">
                <p>Já tem uma conta? <a href="/login.html" class="auth-link">Entre aqui</a></p>
            </footer>
        </main>
    </div>

    <script type="module">
        import { signUp } from './auth.js';

        const signupForm = document.getElementById('signup-form');
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        const errorDisplay = document.getElementById('error-display');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Limpa erros e inicia loading
            errorDisplay.style.display = 'none';
            btnSubmit.disabled = true;
            btnText.innerText = 'Criando conta...';

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                await signUp(email, password, name);
                window.location.href = 'library.html';
            } catch (err) {
                console.error("Erro no cadastro:", err);

                // Mapeamento de erros do Firebase para Signup
                const errorMap = {
                    'auth/email-already-in-use': "Este e-mail já está em uso.",
                    'auth/invalid-email': "Formato de e-mail inválido.",
                    'auth/operation-not-allowed': "O cadastro está desativado no momento.",
                    'auth/weak-password': "A senha é muito fraca. Tente uma mais longa.",
                    'auth/network-request-failed': "Erro de conexão. Verifique sua internet."
                };

                errorDisplay.innerText = errorMap[err.code] || "Não foi possível criar sua conta agora. Tente novamente.";
                errorDisplay.style.display = 'block';

                // Reseta o botão para nova tentativa
                btnSubmit.disabled = false;
                btnText.innerText = 'Criar minha conta';
            }
        });
    </script>
</body>
</html>
