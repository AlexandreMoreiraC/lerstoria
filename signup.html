<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Lerstoria</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dliyfpqqu/image/upload/v1776621920/mcknlpf3fm8snymrfnw8.png">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="auth-page">
    <div class="auth-container">

        <header class="auth-header">
            <a href="/index.html" class="logo" aria-label="Lerstoria Home">.lerstoria</a>
            <h1 class="story-title" style="font-size: 2.2rem; margin-top: 10px; font-weight: 800;">Criar conta</h1>
            <p class="auth-subtitle">Comece sua jornada de leitura hoje mesmo.</p>
        </header>

        <main class="auth-card">

            <div id="error-display" class="error-message" role="alert"></div>

            <form id="signup-form" class="auth-form">

                <!-- Nome -->
                <div class="input-group">
                    <label for="name" class="sr-only">Nome completo</label>
                    <input type="text" id="name" placeholder="Nome completo" class="input-field" autocomplete="name" required>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label for="email" class="sr-only">E-mail</label>
                    <input type="email" id="email" placeholder="E-mail" class="input-field" autocomplete="email" required>
                </div>

                <!-- Senha -->
                <div class="input-group">
                    <label for="password" class="sr-only">Senha</label>
                    <input type="password" id="password" placeholder="Crie uma senha" class="input-field" autocomplete="new-password" minlength="6" required>
                </div>

                <!-- Confirmar senha -->
                <div class="input-group">
                    <label for="confirm-password" class="sr-only">Confirmar senha</label>
                    <input type="password" id="confirm-password" placeholder="Confirme sua senha" class="input-field" required>
                </div>

                <p class="password-hint">Mínimo de 6 caracteres.</p>

                <!-- Termos -->
                <div style="margin: 10px 0;">
                    <label style="font-size: 0.9rem; color: #aaa;">
                        <input type="checkbox" id="terms">
                        Aceito os Termos de Uso e Política de Privacidade
                    </label>
                </div>

                <!-- Botão -->
                <button type="submit" id="btn-submit" class="btn-primary btn-full">
                    <span id="btn-text">Criar minha conta</span>
                </button>

            </form>

            <footer class="auth-footer">
                <p>Já tem uma conta? <a href="/login.html" class="auth-link">Entre aqui</a></p>
            </footer>

        </main>
    </div>

    <script type="module">
        import { signUp } from './auth.js';

        const signupForm = document.getElementById('signup-form');
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        const errorDisplay = document.getElementById('error-display');

        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const termsInput = document.getElementById('terms');

        const validateForm = () => {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!name || !email || !password || !confirmPassword) {
                return "Preenche todos os campos.";
            }

            if (password.length < 6) {
                return "A senha deve ter pelo menos 6 caracteres.";
            }

            if (password !== confirmPassword) {
                return "As senhas não coincidem.";
            }

            if (!termsInput.checked) {
                return "Aceita os termos para continuar.";
            }

            return null;
        };

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorDisplay.style.display = 'none';

            const validationError = validateForm();
            if (validationError) {
                errorDisplay.innerText = validationError;
                errorDisplay.style.display = 'block';
                return;
            }

            btnSubmit.disabled = true;
            btnText.innerText = 'Criando conta...';

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                await signUp(email, password, name);
                window.location.href = 'library.html';

            } catch (err) {
                console.error("Erro no cadastro:", err);

                const errorMap = {
                    'auth/email-already-in-use': "Este e-mail já está em uso.",
                    'auth/invalid-email': "Formato de e-mail inválido.",
                    'auth/operation-not-allowed': "O cadastro está desativado no momento.",
                    'auth/weak-password': "A senha é muito fraca.",
                    'auth/network-request-failed': "Erro de conexão. Verifique sua internet."
                };

                errorDisplay.innerText = errorMap[err.code] || "Não foi possível criar sua conta agora.";
                errorDisplay.style.display = 'block';

                btnSubmit.disabled = false;
                btnText.innerText = 'Criar minha conta';
            }
        });
    </script>

</body>
</html>
