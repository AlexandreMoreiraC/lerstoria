<style>
    /* ============================================================
       AJUSTES DE LAYOUT DO PERFIL (STORYBOOK STYLE)
       ============================================================ */
    
    .header-actions { 
        display: flex; 
        align-items: center; 
        gap: 10px;
    }

    /* Botão de Sair - Minimal Premium Dark */
.btn-logout {
    background: rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 0, 0, 0.08);
    color: rgba(0, 0, 0, 0.65);

    padding: 8px 14px;
    border-radius: 999px;

    font-weight: 500;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.3px;

    cursor: pointer;

    display: inline-flex;
    align-items: center;
    gap: 6px;

    transition: all 0.2s ease;
    margin-left: 10px;
}
    /* Cabeçalho de Nível */
    .level-header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        margin-bottom: 25px; 
        margin-top: 45px; 
        padding-bottom: 10px;
        border-bottom: 1px solid var(--sepia-border);
    }

    .profile-text { 
        display: flex; 
        flex-direction: column; 
        line-height: 1.4; 
    }

    .welcome { 
        font-family: 'Lora', serif;
        font-size: 0.75rem; 
        color: var(--text-soft); 
        font-weight: 600; 
        text-transform: uppercase; 
        letter-spacing: 1.5px; 
    }

    /* Link do Card */
    .book-card-link { 
        text-decoration: none; 
        color: inherit; 
        display: block;
    }

    /* ============================================================
       BOTÃO DE QUIZ - ESTILO 3D "PAPER PRESS"
       ============================================================ */
    
    .btn-quiz { 
        display: inline-flex; /* Mudado de none para inline-flex para controle */
        align-items: center;
        background-color: var(--primary);
        color: white;
        padding: 10px 24px;
        border-radius: 14px;
        font-weight: 800;
        text-decoration: none;
        font-size: 0.85rem;
        border: none;
        font-family: 'Lora', serif;
        /* Efeito 3D mais profundo e suave que o Duolingo tradicional */
        box-shadow: 0 4px 0 #3a1db3; 
        transition: all 0.15s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
    }

    .btn-quiz:hover { 
        filter: brightness(1.1); 
        transform: translateY(-2px); 
        box-shadow: 0 6px 0 #3a1db3;
    }

    .btn-quiz:active { 
        transform: translateY(3px); 
        box-shadow: 0 1px 0 #3a1db3; 
    }

    /* ============================================================
       ESTADOS DA ESTANTE (SHELF)
       ============================================================ */

    /* Estado Bloqueado - Efeito de "Papel Velho e Esmaecido" */
    .shelf-container.locked {
        opacity: 0.4;
        filter: grayscale(1) sepia(0.2); /* Adiciona um tom levemente envelhecido */
        pointer-events: none;
        user-select: none;
        position: relative;
    }

    /* Badge de "Trancado" que aparece na estante */
    .shelf-container.locked::before {
        content: "LOCKED CONTENT";
        position: absolute;
        top: 20px;
        right: 20px;
        font-family: 'Lora', serif;
        font-size: 0.6rem;
        font-weight: 800;
        background: #eee;
        padding: 4px 10px;
        border-radius: 4px;
        color: #999;
        letter-spacing: 1px;
        z-index: 5;
    }
    
    /* Estado Desbloqueado */
    .shelf-container:not(.locked) {
        opacity: 1;
        filter: none;
        pointer-events: auto;
    }

    /* Scroll Horizontal Customizado */
    .horizontal-scroll {
        display: flex;
        gap: 25px;
        overflow-x: auto;
        padding-bottom: 25px;
        padding-top: 10px;
        scroll-behavior: smooth;
        scrollbar-width: none; /* Esconde no Firefox */
    }

    .horizontal-scroll::-webkit-scrollbar {
        height: 4px;
    }

    .horizontal-scroll::-webkit-scrollbar-track {
        background: var(--sepia-border);
        border-radius: 10px;
    }

    .horizontal-scroll::-webkit-scrollbar-thumb {
        background: var(--primary-soft);
        border-radius: 10px;
    }
</style>
