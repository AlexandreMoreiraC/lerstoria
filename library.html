<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Lerstoria</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Ajustes de Layout do Perfil */
        .btn-logout { 
            background: none; 
            border: 2px solid var(--red); 
            color: var(--red); 
            padding: 8px 18px; 
            border-radius: var(--radius-lg); 
            font-weight: 800; 
            cursor: pointer; 
            font-family: inherit; 
            transition: all 0.2s; 
            margin-left: 15px; 
            font-size: 0.9rem; 
        }
        .btn-logout:hover { background-color: var(--red); color: white; box-shadow: 0 4px 0 var(--red-dark); transform: translateY(-1px); }
        .btn-logout:active { transform: translateY(2px); box-shadow: none; }
        
        .header-actions { display: flex; align-items: center; }
        .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .profile-text { display: flex; flex-direction: column; line-height: 1.2; }
        .welcome { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .book-card-link { text-decoration: none; color: inherit; }

        /* Botão de Quiz - Estilo 3D Duolingo */
        .btn-quiz { 
            display: none; /* O JS decide quando mostrar */
            background-color: var(--primary);
            color: white !important;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            font-size: 0.85rem;
            border: none;
            box-shadow: 0 4px 0 var(--primary-dark);
            transition: all 0.1s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-quiz:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-quiz:active { transform: translateY(4px); box-shadow: none; }

        /* Estado Bloqueado */
        .shelf-container.locked {
            opacity: 0.5;
            filter: grayscale(1);
            pointer-events: none;
            user-select: none;
        }
        
        /* Estado Desbloqueado */
        .shelf-container:not(.locked) {
            opacity: 1;
            filter: grayscale(0);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <header class="app-bar">
        <div class="container bar-flex">
            <div class="profile-section">
                <div class="avatar">👤</div>
                <div class="profile-text">
                    <span class="welcome">Olá,</span>
                    <span class="user-name">Carregando...</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="library.html" class="logo-small">Lerstoria</a>
                <button id="btn-logout" class="btn-logout">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="action-row">
            <button class="btn-tab active" id="btn-all">⧉ Todos</button>
            <button class="btn-tab" id="btn-fav">✦ Favoritos</button>
        </div>

        <section class="shelf-container" data-level="A1">
            <div class="level-header">
                <h2 class="level-tag">A1 - Beginner ✔</h2>
                <a href="quiz.html?level=A1" class="btn-quiz">Fazer Prova A1</a>
            </div>
            <div class="horizontal-scroll">
                <div class="book-item" data-id="book_tree">
                    <div class="fav-badge">✦</div>
                    <a href="book.html?id=book_tree" class="book-card-link">
                        <div class="book-card">
                            <div class="book-cover">
                                <img src="https://res.cloudinary.com/dliyfpqqu/image/upload/v1775328132/z1ptjpue42gs7pjyb0ls.png" alt="Saturn">
                            </div>
                            <p>Saturn Exploded</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <section class="shelf-container locked" data-level="A2">
            <div class="level-header">
                <h2 class="level-tag">A2 - Elementary 🔒</h2>
                <a href="quiz.html?level=A2" class="btn-quiz">Fazer Prova A2</a>
            </div>
            <div class="horizontal-scroll">
                <div class="book-item" data-id="book_lunch">
                    <div class="fav-badge">✦</div>
                    <a href="book.html?id=book_lunch" class="book-card-link">
                        <div class="book-card">
                            <div class="book-cover">
                                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200" alt="Lunch">
                            </div>
                            <p>Lunch Time</p>
                        </div>
                    </a>
                </div>
                <div class="book-item" data-id="book_bike">
                    <div class="fav-badge">✦</div>
                    <a href="book.html?id=book_bike" class="book-card-link">
                        <div class="book-card">
                            <div class="book-cover">
                                <img src="https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=200" alt="New Bike">
                            </div>
                            <p>New Bike</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <section class="shelf-container locked" data-level="B1">
            <div class="level-header">
                <h2 class="level-tag">B1 - Intermediate 🔒</h2>
                <a href="quiz.html?level=B1" class="btn-quiz">Fazer Prova B1</a>
            </div>
            <div class="horizontal-scroll">
                <p style="color: var(--text-muted); padding: 20px;">Complete o A2 para liberar!</p>
            </div>
        </section>

        <section class="shelf-container locked" data-level="B2">
            <div class="level-header">
                <h2 class="level-tag">B2 - Upper Intermediate 🔒</h2>
                <a href="quiz.html?level=B2" class="btn-quiz">Fazer Prova B2</a>
            </div>
            <div class="horizontal-scroll"></div>
        </section>

        <section class="shelf-container locked" data-level="C1">
            <div class="level-header">
                <h2 class="level-tag">C1 - Advanced 🔒</h2>
                <a href="quiz.html?level=C1" class="btn-quiz">Fazer Prova C1</a>
            </div>
            <div class="horizontal-scroll"></div>
        </section>

    </main>

    <script type="module">
        import { logout } from './auth.js';
        document.getElementById('btn-logout').addEventListener('click', async () => {
            try { 
                await logout(); 
                window.location.href = 'index.html'; 
            } catch (error) { 
                console.error("Erro ao sair:", error); 
            }
        });
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
